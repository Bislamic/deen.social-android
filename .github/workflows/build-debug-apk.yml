name: Build debug APK

# Builds the deen.social Android debug APK on every push to master and on
# pull requests. The APK is uploaded as a workflow artifact so testers can
# download it before Google Play distribution is set up. Debug builds are
# self-signed (Android default debug keystore) and are not suitable for
# Play Store submission — that path uses a separate release workflow with
# Bislamic's production keystore.

on:
  push:
    branches:
      - master
    paths:
      - 'mastodon/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradle.properties'
      - '.github/workflows/build-debug-apk.yml'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel an in-flight build if a newer commit lands on the same branch.
  group: build-debug-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate local.properties
        # The secrets-gradle-plugin used by upstream requires that
        # local.properties exists (even with no secret values) for the
        # configuration phase to succeed. We point sdk.dir at the
        # runner's preinstalled SDK and leave secret keys blank — debug
        # builds do not need them.
        run: |
          cat > local.properties <<EOF
          sdk.dir=${ANDROID_HOME}
          EOF
          echo "local.properties contents:"
          cat local.properties

      - name: Assemble debug APK
        run: ./gradlew :mastodon:assembleDebug --console=plain --no-daemon

      - name: Locate APK
        id: locate
        run: |
          APK=$(find mastodon/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced. Check the assembleDebug step."
            exit 1
          fi
          SIZE=$(du -h "$APK" | cut -f1)
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "::notice::Built $APK ($SIZE)"

      - name: Verify APK identity
        run: |
          # Confirm our Bislamic patches landed in the artifact, not just upstream.
          AAPT=$(find /usr/local/lib/android/sdk/build-tools -name "aapt2" -type f 2>/dev/null | sort -V | tail -1)
          if [ -z "$AAPT" ]; then
            AAPT=$(find $ANDROID_HOME/build-tools -name "aapt2" -type f 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using $AAPT"
          BADGING=$("$AAPT" dump badging "${{ steps.locate.outputs.apk }}")
          echo "$BADGING" | head -3

          # Hard assert on identity — fail the build if the patches were lost.
          if ! echo "$BADGING" | grep -q "package: name='social.deen.android'"; then
            echo "::error::APK package identity is not social.deen.android — Bislamic identity patch did not land!"
            exit 1
          fi
          if ! echo "$BADGING" | grep -q "application-label:'deen.social'"; then
            echo "::error::APK label is not 'deen.social' — Bislamic app_name patch did not land!"
            exit 1
          fi
          echo "::notice::APK identity verified: social.deen.android / deen.social"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: deen-social-android-debug-${{ github.sha }}
          path: ${{ steps.locate.outputs.apk }}
          retention-days: 30
          if-no-files-found: error
          compression-level: 0  # APK is already compressed

      - name: Job summary
        if: always()
        run: |
          {
            echo "### Build result"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- APK size: ${{ steps.locate.outputs.size }}"
            echo "- Download: open this run on GitHub → 'Artifacts' panel"
            echo ""
            echo "### Install on a connected device"
            echo "\`\`\`bash"
            echo "adb install -r deen-social-android-debug-${{ github.sha }}.apk"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
