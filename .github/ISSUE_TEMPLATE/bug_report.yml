name: Bug report (Bislamic-specific)
description: Report a bug in a deen.social-specific feature of this app
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report. Before filing, please
        check whether the bug is in **the deen.social patches** (this
        repo) or **upstream Mastodon Android** (the bulk of the code).
        Anything not annotated with `// Bislamic:` lives upstream and
        should be reported at https://github.com/mastodon/mastodon-android/issues
        — fixing it there benefits every Mastodon Android user, and
        our auto-sync brings the fix back here within a day.
  - type: dropdown
    id: area
    attributes:
      label: Which Bislamic patch area?
      options:
        - "Instance picker bypass / onboarding"
        - "App identity (applicationId, app_name, universal links)"
        - "Donation rerouting to islamic.social"
        - "Privacy policy URL"
        - "Sentry crash reporting integration"
        - "Branded strings (welcome screen, settings)"
        - "Build / CI"
        - "Other / not sure"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app on a fresh install
        2. Tap "Get Started"
        3. ...
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Settings → About → tap the version line to copy it.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device + Android version
      placeholder: "Pixel 8, Android 14"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: |
        Optional. Crash reports go to Sentry automatically (unless you
        opted out). For non-crash issues, screenshots help.
